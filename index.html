<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <style>
        .fundo h1{
           text-align: center;
           margin-top: 20px;
        }
        .fundo{
            background: radial-gradient(circle at 20% 30%, #1b2735, #090a0f 80%);
            min-height: 100vh;
            width: 100%;
            color:#fff;
            font-family: arial,helvetica,sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }
        .estrelas {
            position: absolute;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            z-index: 0;
        }
        .estrela {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: piscar 2s infinite alternate;
        }
        @keyframes piscar {
            from { opacity: 0.3; }
            to { opacity: 1; }
        }
        .numero-flutuante {
            position: absolute;
            z-index:2;
            color: rgba(255,255,255,0.2);
            font-size: 30px;
            pointer-events: none;
            animation: subir 1.5s ease-out forwards;
        }
        @keyframes subir {
            0% {
         transform: translateY(0);
          opacity: 1;
         }
         100% {
        transform: translateY(-100px);
        opacity: 0;
         }
        }
        .calculadora{
            text-align: center;
            background-color: #000;
            z-index:2;
            position: relative;
            padding: 20px;
            justify-content: center;
            border-radius: 10px;
            width: 300px;
            box-shadow: 
                0 0 15px rgba(0, 0, 0, 0.6),
        }
        .display {
            width: 100%;
            height: 60px;
            font-size: 22px;
            text-align: right;
            margin-bottom: 10px;
            padding: 10px;
            border: none;
            border-radius: 5px;
            box-sizing: border-box;
            background:rgba(255,255,255,0.1);
            color: white;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }
        .botoes {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            grid-auto-rows: 60px;
        }
        button {
            height: 100%;
            width:100%;
            font-size: 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover {
            opacity: 0.9;  
            transform: scale(1.05);
        }
        button:active {
            transform: scale(0.95);
        }
        .operador {
            background: rgb(52, 54, 173);
            color: white;
            box-shadow: 0 0 10px rgba(58, 60, 255, 0.5);
        }
        .numero {
            background: #212121;
            color: rgb(255, 255, 255);
            box-shadow: 0 0 5px rgba(255,255,255,0.1);
        }
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
    </style>
</head>
<body>
    <div class="fundo">
        <div class="estrelas"></div>
        <h1>Anna júlia</h1> 
        <div class="calculadora">
             <h1>calculadora</h1>
             <input type="text" class="display" id="display" readonly>
            <div class="botoes">
        <button class="operador">⌫</button>
        <button class="operador">%</button>
        <button class="operador">÷</button>
        <button class="operador">×</button>

        <button class="numero">7</button>
        <button class="numero">8</button>
        <button class="numero">9</button>
        <button class="operador">-</button>

        <button class="numero">4</button>
        <button class="numero">5</button>
        <button class="numero">6</button>
        <button class="operador">+</button>

        <button class="numero">1</button>
        <button class="numero">2</button>
        <button class="numero">3</button>
        <button class="operador" style="grid-row: span 2;">=</button>

        <button class="numero" style="grid-column: span 2;">0</button>
        <button class="numero">.</button>
        </div>
    </div>
    


<script>
// estrelas
const containerEstrelas = document.querySelector(".estrelas");

for (let i = 0; i < 100; i++) {
    const estrela = document.createElement("div");
    estrela.classList.add("estrela");

    estrela.style.top = Math.random() * 100 + "%";
    estrela.style.left = Math.random() * 100 + "%";

    estrela.style.animationDuration = (Math.random() * 2 + 1) + "s";

    containerEstrelas.appendChild(estrela);
}

// calculadora
const display = document.getElementById("display");
const fundo = document.querySelector(".fundo");

document.querySelectorAll("button").forEach(botao => {
    botao.addEventListener("click", (e) => {
        const valor = botao.innerText;

        // erro
        if (display.value === "Erro") {
            if (!isNaN(valor)) {
                display.value = valor;
            } else {
                display.value = "";
            }
            return;
        }
if (display.value === "undefined") {
            if (!isNaN(valor)) {
                display.value = valor;
            } else {
                display.value = "";
            }
            return;
        }
        // apagar
        if (valor === "⌫") {
            display.value = display.value.slice(0, -1);
            return;
        }

        // animação
        const span = document.createElement("span");
        span.classList.add("numero-flutuante");
        span.innerText = valor;

        span.style.left = e.clientX + "px";
        span.style.top = e.clientY + "px";

        fundo.appendChild(span);
        setTimeout(() => span.remove(), 1500);

        const operadores = ["+", "-", "×", "÷", "%"];
        const ultimo = display.value.slice(-1);

        if (valor === "=") {
            try {
                display.value = eval(display.value
                    .replace(/×/g, "*")
                    .replace(/÷/g, "/"));
            } catch {
                display.value = "Erro";
            }
            return;
        }

        if (display.value === "" && operadores.includes(valor)) return;
        if (operadores.includes(valor) && operadores.includes(ultimo)) return;

        display.value += valor;
    });
});
</script>
</body>
</html>
